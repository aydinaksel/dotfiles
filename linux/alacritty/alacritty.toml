general.import = ["~/.config/alacritty/themes/catppuccin-mocha.toml"]

[env]
TERM = "alacritty"

[window]
padding = { x = 8, y = 8 }
dynamic_padding = true
decorations = "full"
opacity = 1.0

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font Mono", style = "Bold Italic" }

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true

[terminal]
shell = { program = "/home/aydin/.local/share/cargo/bin/nu" }

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "Plus", mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Control", action = "ResetFontSize" },
  { key = "T", mods = "Control|Shift", action = "CreateNewWindow" },
]
